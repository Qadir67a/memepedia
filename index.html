<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memepedia - Auth</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&display=swap" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>

        *{
            box-sizing:border-box;
            font-family:'Pixelify Sans',sans-serif !important;
        }

        body{
            margin:0;
            padding:0;
            background:#ffffff;
            overflow:hidden;
            height:100vh;
            color:#121212;
        }

        /* TOP NAV */

        #top-nav{
            position:fixed;
            top:24px;
            right:24px;
            display:flex;
            gap:16px;
            z-index:999;
        }

        .nav-btn{
            padding:14px 26px;
            font-size:15px;
            font-weight:700;
            border-radius:8px;
            cursor:pointer;
            text-transform:uppercase;
            transition:0.25s;
            letter-spacing:1px;
        }

        .nav-btn-outline{
            background:#ffffff;
            color:#121212;
            border:2px solid #121212;
        }

        .nav-btn-outline:hover{
            transform:translateY(-2px);
            box-shadow:0 5px 14px rgba(0,0,0,0.15);
        }

        .nav-btn-solid{
            background:#b0008b;
            color:white;
            border:2px solid #b0008b;
        }

        .nav-btn-solid:hover{
            background:#d000a4;
            border-color:#d000a4;
            transform:translateY(-2px);
            box-shadow:0 6px 16px rgba(176,0,139,0.35);
        }

        /* HOMEPAGE */

        .homepage{
            width:100%;
            height:100vh;
            background:#ffffff;
            display:flex;
            justify-content:center;
            align-items:center;
            flex-direction:column;
            gap:18px;
            transition:0.4s;
        }

        .homepage.hidden{
            opacity:0;
            pointer-events:none;
            position:absolute;
        }

        .home-logo{
            font-size:72px;
            font-weight:700;
            letter-spacing:4px;
            margin:0;
        }

        .home-text{
            font-size:20px;
            color:#666;
            margin-top:-10px;
        }

        /* AUTH SCREEN */

        .auth-screen{
            width:100%;
            height:100vh;
            display:none;
        }

        .auth-screen.active{
            display:flex;
        }

        .left-panel{
            width:45%;
            background:#ffffff;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        .right-panel{
            width:55%;
            height:100vh;
            background:#000;
        }

        .right-panel img{
            width:100%;
            height:100%;
            object-fit:cover;
        }

        /* FORM */

        .form-container{
            display:none;
            flex-direction:column;
            width:100%;
            max-width:420px;
            gap:18px;
            background:#ffffff;
            padding:42px;
            border-radius:14px;
            box-shadow:0 10px 40px rgba(0,0,0,0.08);
            border:1px solid #f0f0f0;
            animation:fadeIn .4s ease forwards;
        }

        .form-container.active{
            display:flex;
        }

        @keyframes fadeIn{
            from{
                opacity:0;
                transform:translateY(10px);
            }
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .form-container h2{
            font-size:34px;
            margin:0;
            text-align:center;
            text-transform:uppercase;
        }

        .form-subtitle{
            text-align:center;
            color:#666;
            margin-top:-8px;
            margin-bottom:8px;
            font-size:15px;
        }

        .input-group{
            display:flex;
            flex-direction:column;
            gap:8px;
        }

        .input-group label{
            font-size:14px;
            font-weight:700;
        }

        .form-container input,
        .form-container select{
            width:100%;
            padding:16px;
            border-radius:8px;
            border:2px solid #e0e0e0;
            background:#f9f9f9;
            font-size:16px;
            outline:none;
            transition:0.25s;
        }

        .form-container input:focus,
        .form-container select:focus{
            border-color:#a855f7;
            background:#ffffff;
            box-shadow:0 0 0 4px rgba(168,85,247,0.1);
        }

        .password-wrapper{
            position:relative;
        }

        .password-wrapper input{
            padding-right:85px;
        }

        .toggle-password{
            position:absolute;
            right:12px;
            top:50%;
            transform:translateY(-50%);
            border:none;
            background:none;
            cursor:pointer;
            color:#7c3aed;
            font-weight:700;
            font-size:13px;
        }

        .remember-row{
            display:flex;
            align-items:center;
            font-size:14px;
        }

        .remember-me{
            display:flex;
            align-items:center;
            gap:8px;
            color:#444;
        }

        .remember-me input{
            width:auto;
        }

        .submit-btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:8px;
            font-size:18px;
            font-weight:700;
            cursor:pointer;
            color:white;
            background:linear-gradient(45deg,#7c3aed,#b0008b);
            text-transform:uppercase;
            letter-spacing:1px;
            transition:0.25s;
        }

        .submit-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 20px rgba(124,58,237,0.3);
        }

        .switch-form{
            text-align:center;
            font-size:15px;
            color:#666;
        }

        .switch-form span{
            color:#7c3aed;
            cursor:pointer;
            font-weight:700;
        }

        /* MODERN POPUPS */

        .error-popup,
        .success-popup{
            position:fixed;
            top:30px;
            left:50%;
            transform:translateX(-50%);
            background:#ffffff;
            color:#121212;
            padding:18px 24px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.12);
            z-index:999999;
            font-size:15px;
            font-weight:700;
            animation:popupShow .25s ease;
        }

        .error-popup{
            border-left:5px solid #ff2d55;
        }

        .success-popup{
            border-left:5px solid #22c55e;
        }

        @keyframes popupShow{
            from{
                opacity:0;
                transform:translateX(-50%) translateY(-10px);
            }

            to{
                opacity:1;
                transform:translateX(-50%) translateY(0);
            }
        }

        .input-error{
            border-color:#ff2d55 !important;
            background:#fff5f7 !important;
            box-shadow:0 0 0 4px rgba(255,45,85,0.08) !important;
        }

    </style>
</head>
<body>

    <!-- TOP NAV -->

    <div id="top-nav">

        <button class="nav-btn nav-btn-outline"
                onclick="openAuth('signin-form')">
            Sign In
        </button>

        <button class="nav-btn nav-btn-solid"
                onclick="openAuth('signup-form')">
            Create Account
        </button>

    </div>

    <!-- HOMEPAGE -->

    <div class="homepage" id="homepage">

        <h1 class="home-logo">
            MEMEPEDIA
        </h1>

        <p class="home-text">
            Enter the meme universe.
        </p>

    </div>

    <!-- AUTH SCREEN -->

    <div class="auth-screen" id="auth-screen">

        <!-- LEFT PANEL -->

        <div class="left-panel">

            <!-- SIGN IN -->

            <div id="signin-form" class="form-container">

                <h2>Welcome Back</h2>

                <p class="form-subtitle">
                    Log in to continue your Memepedia journey.
                </p>

                <div class="input-group">

                    <label>Username</label>

                    <input type="text"
                           id="login-username"
                           placeholder="Enter your username">

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-wrapper">

                        <input type="password"
                               id="login-password"
                               placeholder="Enter your password">

                        <button type="button"
                                class="toggle-password"
                                onclick="togglePassword('login-password', this)">
                            SHOW
                        </button>

                    </div>

                </div>

                <div class="remember-row">

                    <label class="remember-me">
                        <input type="checkbox">
                        Remember Me
                    </label>

                </div>

                <button class="submit-btn"
                        onclick="signIn()">
                    Log In
                </button>

                <div class="switch-form">
                    Don't have an account?
                    <span onclick="showForm('signup-form')">
                        Create One
                    </span>
                </div>

            </div>

            <!-- SIGN UP -->

            <div id="signup-form" class="form-container">

                <h2>Create Account</h2>

                <p class="form-subtitle">
                    Join Memepedia and create your profile.
                </p>

                <div class="input-group">

                    <label>Username</label>

                    <input type="text"
                           id="signup-username"
                           placeholder="Choose a username">

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <div class="password-wrapper">

                        <input type="password"
                               id="signup-password"
                               placeholder="Create a password">

                        <button type="button"
                                class="toggle-password"
                                onclick="togglePassword('signup-password', this)">
                            SHOW
                        </button>

                    </div>

                </div>

                <div class="input-group">

                    <label>Gender</label>

                    <select id="signup-gender">

                        <option value="">
                            Select Gender
                        </option>

                        <option value="male">
                            Male
                        </option>

                        <option value="female">
                            Female
                        </option>

                        <option value="other">
                            Other
                        </option>

                    </select>

                </div>

                <div class="input-group">

                    <label>Birthday</label>

                    <input type="date"
                           id="signup-birthday">

                </div>

                <button class="submit-btn"
                        onclick="signUp()">
                    Create Account
                </button>

                <div class="switch-form">
                    Already have an account?
                    <span onclick="showForm('signin-form')">
                        Sign In
                    </span>
                </div>

            </div>

        </div>

        <!-- RIGHT PANEL -->

        <div class="right-panel">

            <img src="rainbowcat.gif" alt="GIF">

        </div>

    </div>

    <script>

        // SUPABASE

        const supabaseUrl =
            'https://bbyiajxjggvdhxxhfaeu.supabase.co/';

        const supabaseKey =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJieWlhanhqZ2d2ZGh4eGhmYWV1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4ODg4NDIsImV4cCI6MjA5NTQ2NDg0Mn0.JQLQ0ZXh_7T2wZ_LkU1vAx9yH4vnJ7o00W3RsX_HjZY';

        let supabaseClient;

        try{

            if(window.supabase){

                supabaseClient =
                    window.supabase.createClient(
                        supabaseUrl,
                        supabaseKey
                    );

            }

        }catch(error){

            console.error(error);

        }

        // ELEMENTS

        const homepage =
            document.getElementById('homepage');

        const authScreen =
            document.getElementById('auth-screen');

        const signinForm =
            document.getElementById('signin-form');

        const signupForm =
            document.getElementById('signup-form');

        // MODERN POPUP

        function showPopup(message, type="error"){

            const existing =
                document.querySelector(
                    '.error-popup, .success-popup'
                );

            if(existing){
                existing.remove();
            }

            const popup =
                document.createElement('div');

            popup.className =
                type === "success"
                ? "success-popup"
                : "error-popup";

            popup.innerText = message;

            document.body.appendChild(popup);

            setTimeout(()=>{

                popup.remove();

            },3000);

        }

        // OPEN AUTH

        function openAuth(formId){

            homepage.classList.add('hidden');

            authScreen.classList.add('active');

            showForm(formId);

        }

        // SHOW FORM

        function showForm(formId){

            signinForm.classList.remove('active');

            signupForm.classList.remove('active');

            document.getElementById(formId)
                .classList.add('active');

        }

        // PASSWORD TOGGLE

        function togglePassword(inputId, button){

            const input =
                document.getElementById(inputId);

            if(input.type === "password"){

                input.type = "text";

                button.innerText = "HIDE";

            }else{

                input.type = "password";

                button.innerText = "SHOW";

            }

        }

        // EMAIL GENERATOR

        function generateDummyEmail(username){

            const cleanUsername =
                username
                .toLowerCase()
                .replace(/[^a-z0-9]/g,'');

            return `${cleanUsername}@dummy-app.com`;

        }

        // PASSWORD VALIDATION

        function validatePassword(password){

            const minLength =
                password.length >= 8;

            const hasUppercase =
                /[A-Z]/.test(password);

            const hasSymbol =
                /[!@#$%^&*(),.?":{}|<>]/.test(password);

            return (
                minLength &&
                hasUppercase &&
                hasSymbol
            );

        }

        // CLEAR ERRORS

        function clearErrors(){

            document
                .querySelectorAll('input, select')
                .forEach(el=>{

                    el.classList.remove('input-error');

                });

        }

        // SIGN UP

        async function signUp(){

            clearErrors();

            if(!supabaseClient){

                showPopup("Database disconnected.");

                return;

            }

            const username =
                document.getElementById(
                    'signup-username'
                );

            const password =
                document.getElementById(
                    'signup-password'
                );

            const gender =
                document.getElementById(
                    'signup-gender'
                );

            const birthday =
                document.getElementById(
                    'signup-birthday'
                );

            // REQUIRED FIELDS

            if(
                !username.value ||
                !password.value ||
                !gender.value ||
                !birthday.value
            ){

                if(!username.value){
                    username.classList.add('input-error');
                }

                if(!password.value){
                    password.classList.add('input-error');
                }

                if(!gender.value){
                    gender.classList.add('input-error');
                }

                if(!birthday.value){
                    birthday.classList.add('input-error');
                }

                showPopup(
                    "Please fill in all fields."
                );

                return;

            }

            // PASSWORD RULES

            if(
                !validatePassword(password.value)
            ){

                password.classList.add(
                    'input-error'
                );

                showPopup(
                    "Password must be 8+ characters with one uppercase letter and one symbol."
                );

                return;

            }

            const dummyEmail =
                generateDummyEmail(
                    username.value
                );

            const { data, error } =
                await supabaseClient.auth.signUp({

                    email: dummyEmail,

                    password: password.value,

                    options:{

                        data:{

                            username:
                                username.value,

                            gender:
                                gender.value,

                            birthday:
                                birthday.value

                        }

                    }

                });

            if(error){

                showPopup(error.message);

            }else{

                showPopup(
                    "Account created successfully!",
                    "success"
                );

                showForm('signin-form');

            }

        }

        // SIGN IN

        async function signIn(){

            clearErrors();

            if(!supabaseClient){

                showPopup(
                    "Database disconnected."
                );

                return;

            }

            const username =
                document.getElementById(
                    'login-username'
                );

            const password =
                document.getElementById(
                    'login-password'
                );

            if(
                !username.value ||
                !password.value
            ){

                if(!username.value){
                    username.classList.add(
                        'input-error'
                    );
                }

                if(!password.value){
                    password.classList.add(
                        'input-error'
                    );
                }

                showPopup(
                    "Please fill in all fields."
                );

                return;

            }

            const dummyEmail =
                generateDummyEmail(
                    username.value
                );

            const { data, error } =
                await supabaseClient
                .auth
                .signInWithPassword({

                    email: dummyEmail,

                    password: password.value

                });

            if(error){

                showPopup(
                    "Invalid username or password."
                );

            }else{

                showPopup(
                    "Logged in successfully!",
                    "success"
                );

                console.log(data.user);

            }

        }

    </script>

</body>
</html>
